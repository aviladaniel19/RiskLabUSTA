<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RiskLab USTA — Dashboard de Riesgo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh
    }

    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid #1e2435;
      margin-bottom: 1.5rem
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end
    }

    .header-left h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: .02em
    }

    .header-left p {
      font-size: 12px;
      color: #64748b;
      margin-top: 3px
    }

    .ts {
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #475569;
      text-align: right
    }

    .form-panel {
      background: #161b26;
      border: 1px solid #1e2435;
      border-radius: 10px;
      padding: 1rem;
      display: flex;
      gap: 15px;
      align-items: flex-end
    }

    .form-grp {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .form-grp label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .form-input {
      padding: 8px;
      background: #0f1117;
      border: 1px solid #1e2435;
      color: #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'SF Mono', monospace
    }

    .btn-analizar {
      padding: 9px 18px;
      background: #10b981;
      color: #0f1117;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: opacity .15s
    }

    .btn-analizar:hover {
      opacity: .8
    }

    .btn-analizar:disabled {
      background: #475569;
      cursor: not-allowed
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #1e2435;
      margin-bottom: 1.5rem
    }

    .tab {
      padding: 9px 18px;
      font-size: 13px;
      background: transparent;
      border: 0;
      border-bottom: 2px solid transparent;
      color: #64748b;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .01em
    }

    .tab:hover {
      color: #94a3b8;
      background: rgba(255, 255, 255, .03)
    }

    .tab.act {
      color: #e2e8f0;
      border-bottom-color: #3b82f6;
      font-weight: 500
    }

    .g4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem
    }

    .g3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem
    }

    .g2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem
    }

    .mc {
      background: transparent;
      border: 1px solid #10b981;
      border-radius: 10px;
      padding: 1rem;
      color: #10b981
    }

    .ml {
      font-size: 11px;
      color: #10b981;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .06em;
      opacity: .8
    }

    .mv {
      font-size: 22px;
      font-weight: 600;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #10b981
    }

    .ms {
      font-size: 11px;
      color: #10b981;
      margin-top: 3px;
      opacity: .7
    }

    .card {
      background: #161b26;
      border: 1px solid #1e2435;
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 1.25rem
    }

    .ct {
      font-size: 11px;
      font-weight: 500;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 14px
    }

    .ht {
      width: 100%;
      border-collapse: collapse
    }

    .ht th,
    .ht td {
      padding: 8px 12px;
      font-size: 12px;
      text-align: center;
    }

    .mc:nth-child(n+2) {
      border-color: #3b82f6;
      color: #3b82f6
    }

    .mc:nth-child(n+2) .ml,
    .mc:nth-child(n+2) .ms {
      color: #3b82f6
    }

    .mc:nth-child(3) {
      border-color: #f59e0b;
      color: #f59e0b
    }

    .mc:nth-child(3) .ml,
    .mc:nth-child(3) .ms {
      color: #f59e0b
    }

    /* Estilos para Composición Manual */
    .act-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .act-card {
      background: #0f1117;
      border: 1px solid #1e2435;
      border-radius: 12px;
      padding: 12px;
      transition: border-color .2s;
    }

    .act-card:focus-within {
      border-color: #3b82f6;
    }

    .w-input {
      background: #1e2435;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f1f5f9;
      font-family: 'SF Mono', monospace;
      font-size: 16px;
      font-weight: 600;
      padding: 6px 8px;
      width: 100%;
      text-align: right;
      outline: none;
    }

    .w-input:focus {
      border-color: #3b82f6;
      background: #242b3d;
    }

    .sum-bar-container {
      background: #1e2435;
      border-radius: 20px;
      height: 8px;
      width: 100%;
      overflow: hidden;
      margin: 15px 0;
    }

    .sum-bar-fill {
      height: 100%;
      transition: width .3s, background-color .3s;
    }

    .btn-apply {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-apply:hover {
      background: #2563eb
    }

    .btn-apply:disabled {
      background: #1e2435;
      color: #64748b;
      cursor: not-allowed;
    }

    .ht th {
      color: #64748b;
      font-weight: 500;
      text-align: center;
    }

    .ht td:first-child {
      text-align: center;
      font-weight: 500;
      color: #e2e8f0
    }

    .ht tr:last-child td {
      border-bottom: 0
    }

    .sig {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 5px;
      font-weight: 600;
      letter-spacing: .03em
    }

    .sb {
      background: rgba(16, 185, 129, .15);
      color: #34d399
    }

    .ss {
      background: rgba(239, 68, 68, .15);
      color: #f87171
    }

    .sn {
      background: rgba(100, 116, 139, .12);
      color: #94a3b8
    }

    .srow {
      display: grid;
      grid-template-columns: 88px repeat(4, 1fr);
      gap: 6px;
      align-items: center
    }

    .srow-cell {
      text-align: center;
      padding: 9px 4px;
      border-top: 1px solid #1e2435
    }

    .srow-name {
      font-size: 13px;
      font-weight: 600;
      padding: 9px 4px;
      border-top: 1px solid #1e2435;
      color: #e2e8f0
    }

    .srow-hdr {
      font-size: 11px;
      font-weight: 500;
      color: #64748b;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding-bottom: 8px
    }

    .srow-hdr:first-child {
      text-align: left
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace
    }

    .bar-track {
      height: 5px;
      background: #1e2435;
      border-radius: 3px;
      flex: 1
    }

    .bar-fill {
      height: 5px;
      border-radius: 3px
    }

    .sel-dd {
      padding: 6px 10px;
      background: #0f1117;
      border: 1px solid #1e2435;
      color: #e2e8f0;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'SF Mono', monospace;
      margin-bottom: 10px
    }

    @media(max-width:700px) {

      .g4,
      .g3 {
        grid-template-columns: repeat(2, 1fr)
      }

      .g2 {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="header">
      <div class="header-top">
        <div class="header-left">
          <h1>RiskLab USTA</h1>
          <p>Dashboard Interactivo de Riesgo Financiero &nbsp;·&nbsp; Daniel Avila Otalora - Jhon Alexander Ocampo Gómez
          </p>
        </div>
        <div class="ts" id="ts">Esperando datos...</div>
      </div>
      <div class="form-panel">
        <div class="form-grp" style="flex:2">
          <label>Tickers (separados por coma)</label>
          <input type="text" id="inp-tickers" class="form-input" value="AAPL, MSFT, GOOGL, AMZN, TSLA">
        </div>
        <div class="form-grp" style="flex:1">
          <label>Benchmark</label>
          <select id="inp-bench" class="form-input" style="font-family:inherit">
            <option value="^GSPC">S&P 500 (^GSPC)</option>
            <option value="^DJI">Dow Jones (^DJI)</option>
            <option value="^IXIC">NASDAQ (^IXIC)</option>
          </select>
        </div>
        <div class="form-grp" style="flex:1">
          <label>Período</label>
          <select id="inp-per" class="form-input" style="font-family:inherit">
            <option value="1y">1 Año</option>
            <option value="2y" selected>2 Años</option>
            <option value="5y">5 Años</option>
          </select>
        </div>
        <div class="form-grp">
          <button id="btn-analizar" class="btn-analizar" onclick="loadData()">Analizar</button>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab act" onclick="sw('perf',this)">A. Rendimiento</button>
      <button class="tab" onclick="sw('sig',this)">B. Señales</button>
      <button class="tab" onclick="sw('risk',this)">C. Riesgo</button>
      <button class="tab" onclick="sw('vol',this)">D. Volatilidad</button>
      <button class="tab" onclick="sw('optim',this)">E. Optimización</button>
    </div>

    <div id="s-perf"></div>
    <div id="s-sig" style="display:none"></div>
    <div id="s-risk" style="display:none"></div>
    <div id="s-vol" style="display:none"></div>
    <div id="s-optim" style="display:none"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    /* ── GLOBAL STATE ─────────────────────────────────── */
    let GLOBAL = null;
    let charts = {};

    /* ── UTILS ────────────────────────────────────────── */
    const pct = (v, d = 2) => (v * 100).toFixed(d) + '%';
    const pctS = (v, d = 2) => (v >= 0 ? '+' : '') + pct(v, d);
    const f1 = v => v.toFixed(1), f2 = v => v.toFixed(2), f3 = v => v.toFixed(3);
    const tc = '#64748b', gc = 'rgba(255,255,255,.05)';
    const axBase = { grid: { color: gc }, ticks: { color: tc, font: { size: 11 } } };
    const CLRS = ['#3b82f6', '#10b981', '#f59e0b', '#a78bfa', '#f87171', '#ec4899', '#14b8a6', '#8b5cf6'];
    const sigCls = s => s.includes('COMPRA') ? 'sb' : s.includes('VENDE') ? 'ss' : 'sn';
    function regCh(id, c) { if (charts[id]) charts[id].destroy(); charts[id] = new Chart(id, c) }
    const step = a => { const s = Math.ceil(a.length / 120); return a.filter((_, i) => i % s === 0) };

    /* Escala de colores: Naranja (bajo Sharpe) -> Verde (alto Sharpe) */
    function sharpeColor(sr, minSr, maxSr) {
      let t = maxSr === minSr ? 0.5 : (sr - minSr) / (maxSr - minSr);
      t = Math.max(0, Math.min(1, t));
      // Naranja (#f97316) -> Verde (#10b981)
      let r = Math.round(249 + t * (16 - 249));
      let g = Math.round(115 + t * (185 - 115));
      let b = Math.round(22 + t * (129 - 22));
      return `rgba(${r},${g},${b},0.7)`;
    }

    /* ── API CALLS ────────────────────────────────────── */
    async function api(path, p = {}, method = 'GET', body = null) {
      let url = new URL(path, window.location.origin);
      Object.keys(p).forEach(k => url.searchParams.append(k, p[k]));
      let opt = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opt.body = JSON.stringify(body);
      let res = await fetch(url, opt);
      if (!res.ok) throw new Error(`API ${res.status}: ` + (await res.text()).slice(0, 200));
      return await res.json();
    }

    async function loadData() {
      const btn = document.getElementById('btn-analizar');
      const ts = document.getElementById('ts');
      btn.innerText = "Calculando..."; btn.disabled = true;
      ts.innerHTML = "Preparando consulta...";
      try {
        const rawT = document.getElementById('inp-tickers').value.split(',').map(s => s.trim().toUpperCase()).filter(s => s);
        if (rawT.length < 2) throw new Error("Mínimo 2 tickers requeridos");
        const per = document.getElementById('inp-per').value;
        let w = rawT.map(() => parseFloat((1.0 / rawT.length).toFixed(4)));
        w[0] += (1.0 - w.reduce((a, b) => a + b, 0));

        // Fase 1: Endpoints de portafolio (secuenciales para no saturar Yahoo Finance)
        ts.innerHTML = "[1/4] Calculando CAPM y rendimiento vs benchmark...";
        const capm = await api('/capm', { tickers: rawT.join(','), periodo: per });

        ts.innerHTML = "[2/4] Calculando VaR, CVaR y frontera eficiente...";
        const macro = await api('/macro', { tickers: rawT.join(','), pesos: w.join(','), periodo: per });
        const varData = await api('/var', {}, 'POST', { tickers: rawT, pesos: w, nivel_confianza: 0.95, periodo: per });
        const front = await api('/frontera-eficiente', {}, 'POST', { tickers: rawT, pesos: w, nivel_confianza: 0.95, periodo: per });

        // Fase 2: Endpoints individuales por ticker (secuenciales)
        ts.innerHTML = "[3/4] Descargando precios, rendimientos e indicadores...";
        let rends = [], ind = [], precios = [];
        for (let i = 0; i < rawT.length; i++) {
          ts.innerHTML = `[3/4] Procesando ${rawT[i]} (${i + 1}/${rawT.length})...`;
          rends.push(await api(`/rendimientos/${rawT[i]}`, { periodo: per }));
          ind.push(await api(`/indicadores/${rawT[i]}`, { periodo: per }));
          precios.push(await api(`/precios/${rawT[i]}`, { periodo: per }));
        }

        // Fase 3: Alertas + GARCH (opcional)
        ts.innerHTML = "[4/4] Generando señales técnicas...";
        const alertas = await api('/alertas', { tickers: rawT.join(','), periodo: per });
        let garch = null;
        try { garch = await api(`/garch/${rawT[0]}`, { periodo: per }) } catch (e) { console.warn('GARCH:', e.message); }

        GLOBAL = { tickers: rawT, pesos: w, capm, macro, alertas, varData, front, rends, ind, precios, garch, volData: {} };
        ts.innerHTML = `<span style="color:#10b981">●</span> Sincronizado &nbsp;·&nbsp; ${new Date().toLocaleTimeString('es-CO')}`;
        let act = document.querySelector('.tab.act');
        if (act) sw(act.getAttribute('onclick').match(/'([^']+)'/)[1], act);
      } catch (err) {
        console.error(err);
        ts.innerHTML = `<span style="color:#f87171">Error: ${err.message}</span>`;
      } finally {
        btn.innerText = "Analizar"; btn.disabled = false;
      }
    }

    function validarPesos() {
      const inputs = document.querySelectorAll('.w-input');
      let total = 0;
      inputs.forEach(i => total += (parseFloat(i.value) || 0));

      const valEl = document.getElementById('sum-val');
      const barEl = document.getElementById('sum-bar');
      const btnEl = document.getElementById('btn-aplicar');

      if (valEl) valEl.innerText = total.toFixed(1);
      if (barEl) {
        barEl.style.width = Math.min(total, 100) + '%';
        barEl.style.backgroundColor = total > 100.1 ? '#ef4444' : (total > 99.9 ? '#10b981' : '#3b82f6');
      }
      if (btnEl) btnEl.disabled = total > 100.1;
    }

    async function aplicarPesos() {
      const inputs = document.querySelectorAll('.w-input');
      let vals = Array.from(inputs).map(i => parseFloat(i.value) || 0);
      let total = vals.reduce((a, b) => a + b, 0);

      // Auto-completar/Normalizar si es necesario
      if (total > 0 && total < 100) {
        vals = vals.map(v => (v / total));
      } else {
        vals = vals.map(v => v / 100);
      }

      GLOBAL.pesos = vals;
      const ts = document.getElementById('ts');
      ts.style.display = 'block';
      ts.innerText = "Recalculando métricas con nuevos pesos...";

      try {
        const tickers = GLOBAL.tickers.join(',');
        const per = document.getElementById('inp-per').value;
        const pesosStr = vals.map(v => v.toFixed(4)).join(',');

        // Solo recalculamos los que dependen de los pesos
        const [macro, varData, front] = await Promise.all([
          api('/macro', { tickers, pesos: pesosStr, periodo: per }),
          api('/var', { tickers, pesos: pesosStr, periodo: per }),
          api('/frontera-eficiente', { tickers, n_sim: 500, periodo: per })
        ]);

        GLOBAL.macro = macro;
        GLOBAL.varData = varData;
        GLOBAL.front = front;

        // Limpiar caché de volatilidad ya que el portafolio cambió (opcional, pero mejor refrescar vistas)
        renderPerf();
        renderRisk();
        renderOptim();
        ts.style.display = 'none';
      } catch (e) {
        ts.innerText = "Error recalculando: " + e.message;
        setTimeout(() => ts.style.display = 'none', 3000);
      }
    }

    /* ══ A. RENDIMIENTO ═══════════════════════════════════ */
    function renderPerf() {
      if (!GLOBAL) return;
      const el = document.getElementById('s-perf');
      const m = GLOBAL.macro, c = GLOBAL.capm;
      const pd = m.desempeno_portafolio, bd = m.desempeno_benchmark;

      el.innerHTML = `
    <div class="g4">
      <div class="mc"><div class="ml">Retorno portafolio</div><div class="mv">${pctS(pd.rendimiento_anualizado)}</div><div class="ms">benchmark: ${pctS(bd.rendimiento_anualizado)}</div></div>
      <div class="mc"><div class="ml">Ratio de Sharpe</div><div class="mv">${f3(pd.sharpe_ratio)}</div><div class="ms">benchmark: ${f3(bd.sharpe_ratio)}</div></div>
      <div class="mc"><div class="ml">Tracking Error</div><div class="mv">${pct(m.tracking_error)}</div><div class="ms">Info Ratio: ${f2(m.information_ratio)}</div></div>
      <div class="mc"><div class="ml">Alpha de Jensen</div><div class="mv">${pctS(m.alpha_jensen)}</div><div class="ms">exceso anual vs CAPM</div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="ct" style="margin-bottom:0">Serie de Precios y Medias Móviles</div>
        <div style="display:flex;gap:10px;align-items:center">
          <select class="sel-dd" id="dd-sma" onchange="drawPriceChart()" style="width:100px;font-size:11px">
            <option value="0">Sin SMA</option>
            <option value="20" selected>SMA 20 (Corto)</option>
            <option value="50">SMA 50 (Medio)</option>
            <option value="200">SMA 200 (Largo)</option>
          </select>
          <select class="sel-dd" id="dd-ema" onchange="drawPriceChart()" style="width:100px;font-size:11px">
            <option value="0">Sin EMA</option>
            <option value="20">EMA 20 (Corto)</option>
            <option value="50" selected>EMA 50 (Medio)</option>
            <option value="200">EMA 200 (Largo)</option>
          </select>
          <select class="sel-dd" id="dd-price" onchange="drawPriceChart()" style="width:120px">
            ${GLOBAL.tickers.map((t, i) => `<option value="${i}">${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div style="position:relative;height:280px"><canvas id="c-price"></canvas></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
        <div class="ct" style="margin-bottom:0">Composición y Perfil del Portafolio</div>
        <div id="sum-badge" style="background:#1e2435;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;color:#94a3b8">Total: <span id="sum-val">--</span>%</div>
      </div>
      
      <div class="act-grid">
        ${GLOBAL.tickers.map((t, i) => {
        const beta = c.activos.find(x => x.ticker === t)?.beta || 1;
        const pesoPct = (GLOBAL.pesos[i] * 100).toFixed(1);
        return `
          <div class="act-card">
            <div style="display:flex;justify-content:space-between;margin-bottom:10px">
              <span style="font-weight:700;color:${CLRS[i % CLRS.length]}">${t}</span>
              <span style="font-size:11px;color:#64748b;font-family:'SF Mono',monospace">β ${f2(beta)}</span>
            </div>
            <div style="position:relative">
              <input type="number" class="w-input" data-idx="${i}" value="${pesoPct}" min="0" max="100" step="0.1" oninput="validarPesos()">
              <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;color:#64748b">%</span>
            </div>
          </div>`;
      }).join('')}
      </div>

      <div class="sum-bar-container">

    // Funciones dinámicas MA
    function calcSMA(data, period) {
      return data.map((val, i, arr) => {
        if (i < period - 1) return null;
        let sum = 0;
        for (let j = 0; j < period; j++) sum += arr[i - j];
        return sum / period;
      });
    }

    function calcEMA(data, period) {
      if (data.length === 0) return [];
      const k = 2 / (period + 1);
      let emaArr = new Array(data.length).fill(null);
      let initialSmaSum = 0;

      // Seed con SMA
      for (let i = 0; i < Math.min(period, data.length); i++) {
        initialSmaSum += data[i];
      }
      if (data.length >= period) {
        emaArr[period - 1] = initialSmaSum / period;
      }

      for (let i = period; i < data.length; i++) {
        emaArr[i] = (data[i] - emaArr[i - 1]) * k + emaArr[i - 1];
      }
      return emaArr;
    }

      const crM = f.matriz_correlacion;

      el.innerHTML = `
    <div class="g2">

        <div style="font-size:13px;font-family:'SF Mono',monospace;color:#94a3b8;margin-bottom:12px">Vol <span style="color:#10b981;font-weight:600">${pct(mv.volatilidad_anual)}</span> &nbsp; Ret ${pctS(mv.rendimiento_anual)} &nbsp; Sharpe ${f2(mv.sharpe_ratio)}</div>

    </div>

      <div class="ct">Frontera Eficiente — ${f.n_simulaciones} portafolios simulados (colorbar: Ratio de Sharpe)</div>
      <div style="position:relative;height:320px"><canvas id="c-front"></canvas></div>
    </div>
    <div class="card">
      <div class="ct">Matriz de Correlación de Activos</div>
      <div style="overflow-x:auto"><table class="ht" style="text-align:center">
        <thead><tr><th></th>${f.tickers.map(t => `<th style="text-align:center">${t}</th>`).join('')}</tr></thead>
        <tbody>${f.tickers.map(ti => `<tr><td style="text-align:left;font-weight:600">${ti}</td>
          ${f.tickers.map(tj => `<td style="font-family:'SF Mono',monospace;background:${crM[ti][tj] >= 0 ? `rgba(59,130,246,${.12 + crM[ti][tj] * .45})` : `rgba(239,68,68,${.12 - crM[ti][tj] * .4})`};color:#e2e8f0">${crM[ti][tj].toFixed(2)}</td>`).join('')}
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;

      // ── Frontera Eficiente con colorbar Sharpe ──
      const pts = f.puntos_simulados;
      const sharpes = pts.map(p => p.sharpe);
      const minSr = Math.min(...sharpes), maxSr = Math.max(...sharpes);

      // Ordenar por Sharpe para la línea de la frontera (envelope superior)
      const sorted = [...pts].sort((a, b) => a.volatilidad - b.volatilidad);
      // Construir frontera: para cada bucket de volatilidad, tomar el de mayor rendimiento
      const buckets = 20;
      const vMin = sorted[0].volatilidad, vMax = sorted[sorted.length - 1].volatilidad;
      const bw = (vMax - vMin) / buckets;
      let frontier = [];
      for (let i = 0; i < buckets; i++) {
        const lo = vMin + i * bw, hi = lo + bw;
        const inBucket = sorted.filter(p => p.volatilidad >= lo && p.volatilidad < hi);
        if (inBucket.length > 0) {
          const best = inBucket.reduce((a, b) => b.rendimiento > a.rendimiento ? b : a);

            y: { ...axBase, title: { display: true, text: 'Rendimiento Esperado (%)', color: tc, font: { size: 11 } } }
          }
        }
      });
    }

      if (!GLOBAL) return null;
      const t = GLOBAL.tickers[tickerIdx];
      const per = document.getElementById('inp-per').value;
      if (GLOBAL.volData[t] && !GLOBAL.volData[t].error) return GLOBAL.volData[t];

      try {
        const data = await api(`/volatilidad/${t}`, { periodo: per });
        if (data.error) throw new Error(data.message || "Error desconocido");
        GLOBAL.volData[t] = data;
        return data;
      } catch (e) {
        console.error('Volatilidad error:', e);
        const errObj = { error: true, message: e.message || "Error al conectar con el servidor" };
        GLOBAL.volData[t] = errObj;

          <div style="text-align:right">
            <div style="font-size:10px;color:#64748b;text-transform:uppercase">Distribución de Errores</div>
            <div style="font-size:16px;font-weight:700;color:#3b82f6">${d.resumen_modelo.distribucion}</div>
          </div>
        </div>
        
        <div style="margin-bottom:15px">
          <div style="font-size:11px;color:#94a3b8;margin-bottom:8px">Coeficientes del Modelo y Significancia:</div>
          <table class="ht" style="font-size:11px">
            <thead><tr><th style="text-align:left">Parámetro</th><th style="text-align:right">Valor</th><th style="text-align:right">p-valor</th><th style="text-align:center">Sig.</th></tr></thead>
            <tbody>
              ${d.resumen_modelo.coeficientes.map(c => `
                <tr>
                  <td style="text-align:left;font-family:'SF Mono',monospace;color:#e2e8f0">${c.parametro}</td>
                  <td style="text-align:right;font-family:'SF Mono',monospace">${c.valor.toFixed(6)}</td>
                  <td style="text-align:right;font-family:'SF Mono',monospace;color:${c.p_valor < 0.05 ? '#10b981' : '#64748b'}">${c.p_valor.toFixed(4)}</td>
                  <td style="text-align:center;color:#f59e0b;font-weight:700">${c.significancia}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div style="font-size:9px;color:#475569;margin-top:4px">Significancia: *** p<0.01, ** p<0.05, * p<0.1</div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
          <div style="background:#1e2435;padding:8px;border-radius:6px;text-align:center">
            <div style="font-size:9px;color:#64748b;text-transform:uppercase">Log-Likelihood</div>
            <div style="font-size:13px;font-family:'SF Mono',monospace">${d.resumen_modelo.loglik}</div>
          </div>
          <div style="background:#1e2435;padding:8px;border-radius:6px;text-align:center">
            <div style="font-size:9px;color:#64748b;text-transform:uppercase">AIC</div>
            <div style="font-size:13px;font-family:'SF Mono',monospace;color:#10b981">${d.resumen_modelo.aic}</div>
          </div>
          <div style="background:#1e2435;padding:8px;border-radius:6px;text-align:center">
            <div style="font-size:9px;color:#64748b;text-transform:uppercase">BIC</div>
            <div style="font-size:13px;font-family:'SF Mono',monospace">${d.resumen_modelo.bic}</div>
          </div>
        </div>
      </div>
      <div style="font-size:11px;color:#64748b;margin-top:10px;line-height:1.4">
        🔍 <strong>Interpretación:</strong> La persistencia de la volatilidad ($\alpha + \beta$) cercana a 1 sugiere "memoria larga" en las crisis. 
        ${d.resumen_modelo.coeficientes.some(c => c.parametro.includes('gamma') && c.p_valor < 0.05) ? '<br>⚠️ <strong>Efecto Apalancamiento detectado:</strong> Las caídas de precio generan mayor volatilidad que las subidas.' : ''}
      </div>
    </div>


    <div class="card">
      <div class="ct">Rendimientos al Cuadrado r²(t) — Evidencia de Agrupamiento de Volatilidad</div>
      <div style="position:relative;height:180px"><canvas id="c-retsq"></canvas></div>
    </div>

    <div class="card">
      <div class="ct">Volatilidad Condicional Anualizada σ(t) — ${d.mejor_modelo}</div>
      <div style="position:relative;height:220px"><canvas id="c-volcond"></canvas></div>
    </div>

    <div class="g2">
      <div class="card" style="margin-bottom:0">
        <div class="ct">Pronóstico de Volatilidad — 30 Días</div>
        <div style="position:relative;height:200px"><canvas id="c-volfore"></canvas></div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="ct">Residuos Estandarizados z(t) = â(t)/σ̂(t)</div>
        <div style="position:relative;height:200px"><canvas id="c-stdres"></canvas></div>
      </div>
    </div>

    <div class="card" style="margin-top:1.25rem">
      <div class="ct">6. Diagnóstico y Validación del Modelo</div>
      <div style="overflow-x:auto">
      <table class="ht">
        <thead><tr><th>Métrica</th><th>Valor</th><th>Resultado</th></tr></thead>
        <tbody>
          <tr><td>Media residuos z(t)</td><td style="font-family:'SF Mono',monospace">${diag.media}</td><td>${Math.abs(diag.media) < 0.1 ? '<span class="sig sb">✓ ≈ 0</span>' : '<span class="sig ss">✗ ≠ 0</span>'}</td></tr>
          <tr><td>Desv. Estándar z(t)</td><td style="font-family:'SF Mono',monospace">${diag.desv_estandar}</td><td>${Math.abs(diag.desv_estandar - 1) < 0.15 ? '<span class="sig sb">✓ ≈ 1</span>' : '<span class="sig ss">✗ ≠ 1</span>'}</td></tr>
          <tr><td>Asimetría z(t)</td><td style="font-family:'SF Mono',monospace">${diag.asimetria}</td><td>${Math.abs(diag.asimetria) < 0.5 ? '<span class="sig sb">✓ Simétrico</span>' : '<span class="sig sn">Asimétrico</span>'}</td></tr>
          <tr><td>Curtosis Exceso z(t)</td><td style="font-family:'SF Mono',monospace">${diag.curtosis_exceso}</td><td>${diag.curtosis_exceso > 1 ? '<span class="sig sn">Colas pesadas</span>' : '<span class="sig sb">✓ Normal</span>'}</td></tr>
          <tr><td>Jarque-Bera z(t)</td><td style="font-family:'SF Mono',monospace">JB=${diag.jb_estadistico} &nbsp; p=${diag.jb_p_valor}</td><td>${diag.residuos_normales ? '<span class="sig sb">✓ Normalidad</span>' : '<span class="sig ss">✗ No normal</span>'}</td></tr>
          <tr><td>Ljung-Box z(t) (lag 10)</td><td style="font-family:'SF Mono',monospace">p=${diag.ljung_box_p_valor}</td><td>${diag.sin_autocorrelacion ? '<span class="sig sb">✓ Sin autocorrelación</span>' : '<span class="sig ss">✗ Autocorrelación</span>'}</td></tr>
        </tbody>
      </table>
      </div>
      <div style="font-size:11px;color:#64748b;margin-top:10px;line-height:1.5">
        Si los residuos estandarizados z(t) no muestran autocorrelación y z²(t) no presenta efectos ARCH remanentes, el modelo está correctamente especificado.
        ${!diag.residuos_normales ? ' Se recomienda re-estimar con distribución <strong>t-Student</strong> para capturar colas pesadas.' : ''}
      </div>
    </div>`;

      // ── Charts ──
      const stepV = a => { const s = Math.ceil(a.length / 200); return a.filter((_, i) => i % s === 0); };

      // Rendimientos al cuadrado
      const rSq = stepV(d.serie_rendimientos_cuadrados);
      regCh('c-retsq', {
        type: 'bar', data: {
          labels: rSq.map(x => x.fecha), datasets: [{
            label: 'r²(t)', data: rSq.map(x => x.valor * 10000), backgroundColor: 'rgba(99,102,241,.4)', borderWidth: 0
          }]
        }, options: {
          responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { x: { ...axBase, ticks: { ...axBase.ticks, maxTicksLimit: 8 } }, y: { ...axBase, ticks: { ...axBase.ticks, callback: v => v.toFixed(1) + 'bp' } } }
        }
      });

      // Volatilidad condicional
      const vC = stepV(d.serie_volatilidad_condicional);
      regCh('c-volcond', {
        type: 'line', data: {
          labels: vC.map(x => x.fecha), datasets: [{
            label: 'σ(t) Anualizada', data: vC.map(x => x.volatilidad * 100), borderColor: '#f59e0b', borderWidth: 1.8, pointRadius: 0, fill: true, backgroundColor: 'rgba(245,158,11,.08)', tension: .3
          }]
        }, options: {
          responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { x: { ...axBase, ticks: { ...axBase.ticks, maxTicksLimit: 8 } }, y: { ...axBase, ticks: { ...axBase.ticks, callback: v => v.toFixed(0) + '%' } } }
        }
      });

      // Pronóstico
      regCh('c-volfore', {
        type: 'line', data: {
          labels: Array.from({ length: d.pronostico_volatilidad.length }, (_, i) => 'D+' + (i + 1)),
          datasets: [{ label: 'Pronóstico σ', data: d.pronostico_volatilidad.map(v => v * Math.sqrt(252) * 100), borderColor: '#10b981', borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#10b981', fill: true, backgroundColor: 'rgba(16,185,129,.07)', tension: .4 }]
        }, options: {
          responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { x: { ...axBase }, y: { ...axBase, ticks: { ...axBase.ticks, callback: v => v.toFixed(1) + '%' } } }
        }
      });

      // Residuos estandarizados
      const rS = stepV(d.serie_residuos_estandarizados);
      regCh('c-stdres', {
        type: 'line', data: {
          labels: rS.map(x => x.fecha), datasets: [{
            label: 'z(t)', data: rS.map(x => x.valor), borderColor: '#a78bfa', borderWidth: 1, pointRadius: 0, fill: false, tension: .2
          }]
        }, options: {
          responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { x: { ...axBase, ticks: { ...axBase.ticks, maxTicksLimit: 8 } }, y: { ...axBase } }
        }
      });
    }
  </script>
</body>

</html>
