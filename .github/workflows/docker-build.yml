name: Docker Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false
        tags: risklab-backend:latest

    - name: Build frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: false
        tags: risklab-frontend:latest

    - name: Test docker-compose
      run: |
        docker-compose config
        docker-compose build --no-cache
